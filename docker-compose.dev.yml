version: "3.9"
# Development mode - extends base docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  fastapi:
    env_file:
      - '.env'
    volumes:
      - ./app:/app/app
    command: > 
      uvicorn app.api.main:app
      --host 0.0.0.0 
      --port 8000
      --reload

  worker:
    env_file:
      - '.env'
    volumes:
      - ./app/:/app/app
    command: >
      celery -A app.tasks.core worker
      --loglevel=info
      -Q sync_queue
      --concurrency=1