apiVersion: apps/v1
kind: Deployment
metadata:
  name: adapter-system-acme-corp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adapter-system
      customer: acme-corp
    template:
      metadata:
        labels:
          app: adapter-system
          customer: acme-corp
        spec:
          containers:
            - name: adapter-system
              image: adapter-system:1.1.0
              env:
                - name: CUSTOMER_ID
                  value: "acme-corp"
                - name: INSTANCE-ID
                  value: "acme-corp-k8s-pod"

              livenessProbe:
                httpGet:
                  path: /health/live
                  port: 8000
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3

              readinessProbe:
                httpGet:
                  path: /health/ready
                  port: 8000
                initialDelaySeconds: 10
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 2

              startupProbe:
                httpGet:
                  path: /health/startup
                  port: 8000
                initialDelaySeconds: 0
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 30

              ports:
                - containerPort: 8000

              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"
